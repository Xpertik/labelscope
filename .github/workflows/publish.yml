# Publishes labelscope to PyPI on every GitHub Release.
#
# This workflow uses PyPI trusted publishing (OIDC) — no API token is
# stored in repository secrets. Before the first release, configure the
# trusted publisher on PyPI as described at:
#   https://docs.pypi.org/trusted-publishers/
# The trusted publisher must match: repo = Xpertik/labelscope,
# workflow filename = publish.yml, environment = pypi (optional).

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/labelscope/
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
